<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guilherme ❤️ Vitória</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #ff4d6d, #ff758f);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: rgba(255,255,255,0.15);
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  backdrop-filter: blur(10px);
}

h1 {
  margin-bottom: 10px;
  font-size: 28px;
}

p {
  font-size: 16px;
  line-height: 1.5;
}

.tempo {
  margin: 15px 0;
  font-weight: bold;
}

img {
  width: 100%;
  border-radius: 15px;
  margin-top: 15px;
}

button {
  margin-top: 15px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4d6d;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h1>Guilherme ❤️ Vitória</h1>

  <div class="tempo" id="tempo"></div>

  <p>
    Desde o dia que você entrou na minha vida, tudo ficou melhor.
    Eu te amo ❤️
  </p>

  <img src="foto.jpg" alt="foto do casal">

  <button onclick="tocar()">Tocar música 🎵</button>

  <audio id="musica">
    <source src="musica.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
// contador
const inicio = new Date("2026-03-08");

function atualizar() {
  const agora = new Date();
  const diff = agora - inicio;

  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));

  document.getElementById("tempo").innerHTML =
    dias + " dias juntos ❤️";
}

setInterval(atualizar, 1000);
atualizar();

// música
function tocar() {
  document.getElementById("musica").play();
}
</script>

</body>
</html>
